apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  labels:
    app: orders
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
    spec:
      containers:
        - name: orders
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Arguments tell the Go binary to listen on 8080 and reply with valid JSON
          args:
            - "-text={\"status\":\"UP\",\"service\":\"orders-mock\"}"
            - "-listen=:8080"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          # Updated probes to hit "/" which matches how hashicorp/http-echo behaves
          startupProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
